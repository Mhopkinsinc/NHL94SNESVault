<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NHL 94 SNES Tile Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: monospace;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 20px;
    }
    h1 { color: #00d4ff; margin-bottom: 16px; }
    .controls {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    label { font-size: 14px; }
    input[type="file"] { color: #e0e0e0; }
    input[type="text"], input[type="number"], select {
      background: #16213e;
      color: #e0e0e0;
      border: 1px solid #0f3460;
      padding: 4px 8px;
      font-family: monospace;
    }
    button {
      background: #0f3460;
      color: #00d4ff;
      border: 1px solid #00d4ff;
      padding: 6px 16px;
      cursor: pointer;
      font-family: monospace;
      font-size: 14px;
    }
    button:hover { background: #1a4a7a; }
    #debugToggle {
      padding: 4px 8px;
      line-height: 1;
      border-color: #0f3460;
    }
    #debugToggle:disabled { opacity: 0.3; cursor: default; }
    #debugToggle.active svg line, #debugToggle.active svg circle {
      stroke: #00d4ff;
    }
    #debugToggle:not(:disabled):hover svg line,
    #debugToggle:not(:disabled):hover svg circle {
      stroke: #00d4ff;
    }
    #status {
      margin: 12px 0;
      padding: 8px;
      background: #16213e;
      border-left: 3px solid #00d4ff;
      white-space: pre-wrap;
      font-size: 13px;
      max-height: 80px;
      overflow-y: auto;
    }
    .debug-panel {
      display: none;
      margin: 12px 0;
      border: 1px solid #0f3460;
      background: #0d1117;
    }
    .debug-tabs {
      display: flex;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
    }
    .debug-tab {
      padding: 6px 16px;
      cursor: pointer;
      font-family: monospace;
      font-size: 13px;
      color: #888;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
    }
    .debug-tab:hover { color: #ccc; }
    .debug-tab.active {
      color: #00d4ff;
      border-bottom-color: #00d4ff;
    }
    .debug-tab-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
    }
    .copy-btn {
      padding: 3px 10px;
      font-size: 11px;
      background: #16213e;
      color: #888;
      border: 1px solid #0f3460;
      cursor: pointer;
      font-family: monospace;
    }
    .copy-btn:hover { color: #00d4ff; border-color: #00d4ff; }
    .debug-tab-content {
      display: none;
      padding: 8px;
      white-space: pre;
      font-size: 12px;
      max-height: 400px;
      overflow-y: auto;
      line-height: 1.4;
      color: #c0c0c0;
    }
    .debug-tab-content.active { display: block; }
    .canvas-container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      align-items: flex-start;
    }
    .canvas-section { text-align: center; }
    .canvas-section h3 { margin-bottom: 8px; color: #aaa; }
    canvas {
      image-rendering: pixelated;
      border: 1px solid #0f3460;
      background: #000;
    }
  </style>
  <script type="module" crossorigin src="/assets/index-bzM8lHhh.js"></script>
</head>
<body>
  <h1>NHL 94 SNES - Master Decompression Tool</h1>

  <div class="controls">
    <label>ROM File: <input type="file" id="romFile" accept=".sfc,.smc,.bin" /></label>
  </div>
  <div class="controls">
    <label>Mode:
      <select id="mode">
        <option value="decompress" selected>Decompress</option>
        <option value="sprite-frame">Sprite Frame Browser</option>
        <option value="team-logos">Team Logo Browser</option>
        <option value="setup-logos">Game Setup Logo Browser</option>
        <option value="player-portraits">Player Portraits Browser</option>
      </select>
    </label>
    <button id="debugToggle" disabled title="Toggle debug panel">
      <svg id="debugIcon" width="16" height="16" viewBox="0 0 16 16" fill="none" style="vertical-align: middle;">
        <circle cx="8" cy="5" r="3.5" stroke="#888" stroke-width="1.4" fill="none"/>
        <line x1="8" y1="8.5" x2="8" y2="14" stroke="#888" stroke-width="1.4"/>
        <line x1="5.5" y1="11" x2="10.5" y2="11" stroke="#888" stroke-width="1.4"/>
        <line x1="4.5" y1="2.5" x2="2.5" y2="0.5" stroke="#888" stroke-width="1.4"/>
        <line x1="11.5" y1="2.5" x2="13.5" y2="0.5" stroke="#888" stroke-width="1.4"/>
        <line x1="4.5" y1="6.5" x2="1.5" y2="6.5" stroke="#888" stroke-width="1.4"/>
        <line x1="11.5" y1="6.5" x2="14.5" y2="6.5" stroke="#888" stroke-width="1.4"/>
      </svg>
    </button>
  </div>

  <!-- Decompress mode controls -->
  <div id="decompressControls">
    <div class="controls">
      <label>SNES Address: <input type="text" id="snesAddr" value="99:C426" size="10" /></label>
      <label>Tiles Wide: <input type="number" id="tilesWide" value="6" min="1" max="32" /></label>
      <label>Scale: <input type="number" id="scale" value="4" min="1" max="16" /></label>
      <label>Format:
        <select id="format">
          <option value="nibble" selected>Nibble-packed (FB30 WRAM)</option>
          <option value="bitplane4">4bpp Bitplane (VRAM)</option>
          <option value="bitplane2">2bpp Bitplane (VRAM)</option>
        </select>
      </label>
      <button id="decompressBtn" disabled>Decompress</button>
    </div>
    <div class="controls">
      <label>Palette (SNES addr or hex bytes):
        <input type="text" id="paletteInput" value="9A:F55C" size="60" />
      </label>
    </div>
  </div>

  <!-- Sprite Frame Browser controls -->
  <div id="spriteFrameControls" style="display: none;">
    <div class="controls">
      <label>Frame ID:
        <input type="number" id="frameId" value="1" min="1" max="976" size="5" />
      </label>
      <span style="color: #555;">/ 976</span>
      <button id="framePrev" disabled title="Previous frame (left arrow)">&#9664; Prev</button>
      <button id="frameNext" disabled title="Next frame (right arrow)">Next &#9654;</button>
      <button id="frameGo" disabled>Go</button>
      <label>Scale: <input type="number" id="frameScale" value="6" min="1" max="16" /></label>
    </div>
    <div class="controls">
      <label>Palette (SNES addr or hex bytes):
        <input type="text" id="framePaletteInput" value="96:CB6E" size="60" placeholder="Leave empty for grayscale" />
      </label>
    </div>
    <div class="controls">
      <label><input type="checkbox" id="autoPlay" /> Auto-play</label>
      <label>Speed (ms): <input type="number" id="autoPlaySpeed" value="200" min="50" max="2000" step="50" size="5" /></label>
    </div>
  </div>

  <!-- Team Logo Browser controls -->
  <div id="teamLogoControls" style="display: none;">
    <div class="controls">
      <label>Team:
        <select id="teamSelect"></select>
      </label>
      <button id="teamPrev" disabled title="Previous team">&#9664; Prev</button>
      <button id="teamNext" disabled title="Next team">Next &#9654;</button>
      <label>Scale: <input type="number" id="teamScale" value="8" min="1" max="16" /></label>
    </div>
    <div class="controls">
      <label>Palette (SNES addr or hex bytes):
        <input type="text" id="teamPaletteInput" value="" size="60" placeholder="Leave empty — auto-detected from ROM" />
      </label>
    </div>
  </div>

  <!-- Game Setup Logo Browser controls -->
  <div id="setupLogoControls" style="display: none;">
    <div class="controls">
      <label>Team:
        <select id="setupTeamSelect"></select>
      </label>
      <button id="setupPrev" disabled title="Previous team">&#9664; Prev</button>
      <button id="setupNext" disabled title="Next team">Next &#9654;</button>
      <label>Side:
        <select id="setupSide">
          <option value="home" selected>Home (left)</option>
          <option value="away">Away (right)</option>
        </select>
      </label>
      <label>Scale: <input type="number" id="setupScale" value="8" min="1" max="16" /></label>
    </div>
    <div class="controls">
      <label>Palette (SNES addr or hex bytes):
        <input type="text" id="setupPaletteInput" value="" size="60" placeholder="Leave empty — auto-detected from ROM" />
      </label>
    </div>
  </div>

  <!-- Player Portraits Browser controls -->
  <div id="playerPortraitControls" style="display: none;">
    <div class="controls">
      <label>Team:
        <select id="portraitTeamSelect"></select>
      </label>
      <label>Portrait:
        <select id="portraitSelect"></select>
      </label>
      <label>Tiles Wide: <input type="number" id="portraitTilesWide" value="6" min="1" max="32" /></label>
      <label>Scale: <input type="number" id="portraitScale" value="4" min="1" max="16" /></label>
      <label>Format:
        <select id="portraitFormat">
          <option value="nibble" selected>Nibble-packed (FB30 WRAM)</option>
          <option value="bitplane4">4bpp Bitplane (VRAM)</option>
          <option value="bitplane2">2bpp Bitplane (VRAM)</option>
        </select>
      </label>
      <button id="portraitLoadBtn" disabled>Load Portrait</button>
    </div>
    <div class="controls">
      <label>Palette (SNES addr or hex bytes):
        <input type="text" id="portraitPaletteInput" value="" size="60" placeholder="Leave empty for grayscale" />
      </label>
    </div>
  </div>

  <div id="status">Load a ROM file to begin.</div>

  <div id="debugPanel" class="debug-panel">
    <div id="debugBody">
      <div class="debug-tabs">
        <button class="debug-tab active" data-tab="log">Log</button>
        <button class="debug-tab" data-tab="hexdump">Hex Dump</button>
        <button class="debug-tab" data-tab="raw">Raw Data</button>
        <div class="debug-tab-actions">
          <span id="debugInfo" style="color: #555; font-size: 11px; margin-right: 8px;"></span>
          <button id="copyBtn" class="copy-btn" title="Copy active tab contents">Copy</button>
        </div>
      </div>
      <div id="tabLog" class="debug-tab-content active"></div>
      <div id="tabHexdump" class="debug-tab-content"></div>
      <div id="tabRaw" class="debug-tab-content"></div>
    </div>
  </div>

  <div class="canvas-container">
    <div class="canvas-section">
      <h3>Individual Tiles</h3>
      <canvas id="tilesCanvas"></canvas>
    </div>
    <div class="canvas-section">
      <h3>Assembled Image</h3>
      <canvas id="imageCanvas"></canvas>
    </div>
  </div>

</body>
</html>
